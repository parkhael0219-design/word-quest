<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hael's English Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f5f7fa; color: #333; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; padding: 20px; flex-direction: column; flex-grow: 1; }
        .active { display: flex; }

        /* 메인 화면 */
        .main-header { text-align: center; padding-top: 50px; padding-bottom: 20px; }
        .main-icon { font-size: 70px; margin-bottom: 15px; }
        .main-title { font-size: 28px; font-weight: 900; color: #2d3436; margin-bottom: 8px; }
        .main-desc { color: #636e72; margin-bottom: 35px; font-size: 15px; }

        .btn { border: none; border-radius: 16px; padding: 20px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 12px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-choice { background-color: #0984e3; color: white; }
        .btn-typing { background-color: #6c5ce7; color: white; }
        .btn-study { background-color: #ffffff; color: #2d3436; border: 2px solid #dfe6e9; }
        .btn:active { transform: scale(0.97); }

        /* 진행도 바 */
        .progress-container { background: #dfe6e9; border-radius: 10px; height: 8px; margin-bottom: 20px; }
        .progress-fill { background: #00cec9; height: 100%; border-radius: 10px; width: 0%; transition: 0.3s; }

        /* 퀴즈 박스 */
        .quiz-card { background: white; border-radius: 24px; padding: 40px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; position: relative; }
        .quiz-word { font-size: 40px; font-weight: 900; color: #2d3436; margin-bottom: 10px; }
        
        /* 발음 버튼 스타일 */
        .btn-speak { background: #e0e7ff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 20px; color: #4f46e5; margin-bottom: 10px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-speak:hover { background: #c7d2fe; transform: scale(1.1); }

        /* 예문 박스 */
        .example-box { display: none; background: #f8f9fa; border-left: 5px solid #0984e3; padding: 18px; text-align: left; margin-top: 20px; border-radius: 12px; animation: fadeIn 0.4s; }
        .ex-en { font-size: 15px; color: #2d3436; font-style: italic; margin-bottom: 6px; line-height: 1.4; display: flex; align-items: flex-start; gap: 8px; }
        .ex-ko { font-size: 13px; color: #7f8c8d; padding-left: 28px; }
        .mini-speak { cursor: pointer; color: #0984e3; font-size: 16px; margin-top: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 객관식 리스트 */
        .choice-list { display: grid; gap: 12px; }
        .choice-item { background: white; border: 2px solid #f1f2f6; border-radius: 18px; padding: 18px; font-size: 16px; text-align: center; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .correct { background: #55efc4 !important; border-color: #00b894 !important; color: white; }
        .wrong { background: #ff7675 !important; border-color: #d63031 !important; color: white; }
        
        /* 주관식 입력창 */
        .typing-container { display: none; }
        .input-word { width: 100%; padding: 20px; font-size: 22px; border: 2px solid #dfe6e9; border-radius: 18px; text-align: center; box-sizing: border-box; margin-bottom: 15px; font-weight: bold; }
        .input-word:focus { border-color: #6c5ce7; outline: none; background-color: #fefaff; }

        .btn-next { display: none; background: #2d3436; color: white; margin-top: 20px; }
        .btn-back { background: transparent; color: #adb5bd; font-size: 14px; margin-top: 10px; text-decoration: underline; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-screen" class="screen active">
        <div class="main-header">
            <div class="main-icon">💎</div>
            <div class="main-title">Hael's Intelligence</div>
            <div class="main-desc">필수 영단어 20제 (100+ 단어 랜덤)</div>
        </div>
        <button class="btn btn-choice" onclick="startQuiz('choice')">객관식 퀘스트</button>
        <button class="btn btn-typing" onclick="startQuiz('typing')">주관식 퀘스트</button>
        <button class="btn btn-study" onclick="startQuiz('study')">예문 집중 학습</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-info" style="margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #636e72;">문제 01 / 20</div>
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
        
        <div class="quiz-card">
            <button id="main-speaker" class="btn-speak" style="display:none;" onclick="speakCurrentWord()">🔊</button>
            <div id="question-word" class="quiz-word">Word</div>
            <div id="word-answer-peek" style="display:none; color:#0984e3; font-size:20px; font-weight:bold; margin-bottom:10px;">정답 표시</div>
            
            <div id="example-box" class="example-box">
                <div class="ex-en">
                    <span class="mini-speak" onclick="speakCurrentExample()">🔊</span>
                    <span id="ex-en-text">Example sentence</span>
                </div>
                <div id="ex-ko" class="ex-ko">예문 해석</div>
            </div>
        </div>
        
        <div id="choices" class="choice-list"></div>

        <div id="typing-ui" class="typing-container">
            <input type="text" id="user-input" class="input-word" placeholder="영단어 입력" autocomplete="off" spellcheck="false">
            <button class="btn btn-typing" onclick="checkTypingAnswer()">정답 확인</button>
        </div>

        <div id="study-ui" style="display:none;">
            <button class="btn btn-choice" onclick="showStudyResult()">정답 및 예문 보기</button>
        </div>

        <button id="next-btn" class="btn btn-next" onclick="next()">다음으로 👉</button>
        <button class="btn btn-back" onclick="location.reload()">메인으로 돌아가기</button>
    </div>
</div>

    let sessionWords = [];
    let current = 0;
    let score = 0;
    let quizMode = '';

    // TTS 발음 함수
    function playTTS(text) {
        window.speechSynthesis.cancel(); // 이전 소리 끄기
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // 속도 약간 천천히
        window.speechSynthesis.speak(utterance);
    }

    function speakCurrentWord() {
        playTTS(sessionWords[current].w);
    }

    function speakCurrentExample() {
        playTTS(sessionWords[current].ex);
    }

    function startQuiz(mode) {
        quizMode = mode;
        current = 0; score = 0;
        sessionWords = [...allDatabase].sort(() => Math.random() - 0.5).slice(0, 20);
        
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        
        document.getElementById('choices').style.display = (mode === 'choice') ? 'grid' : 'none';
        document.getElementById('typing-ui').style.display = (mode === 'typing') ? 'block' : 'none';
        document.getElementById('study-ui').style.display = (mode === 'study') ? 'block' : 'none';
        
        showQuestion();
    }

    function showQuestion() {
        const q = sessionWords[current];
        const wordDisplay = document.getElementById('question-word');
        const peek = document.getElementById('word-answer-peek');
        const mainSpeaker = document.getElementById('main-speaker');
        
        peek.style.display = 'none';
        
        if (quizMode === 'typing') {
            wordDisplay.innerText = q.m;
            mainSpeaker.style.display = 'none'; // 주관식은 단어가 안보이니 스피커 숨김
        } else {
            wordDisplay.innerText = q.w;
            mainSpeaker.style.display = 'inline-flex'; // 객관식/예문은 스피커 보여줌
        }
        
        document.getElementById('ex-en-text').innerText = q.ex;
        document.getElementById('ex-ko').innerText = q.exk;
        document.getElementById('example-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress-info').innerText = `문제 ${String(current + 1).padStart(2, '0')} / 20`;
        document.getElementById('progress-bar').style.width = `${((current + 1) / 20) * 100}%`;

        if (quizMode === 'choice') {
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            let options = [q.m];
            while(options.length < 4) {
                let randomM = allDatabase[Math.floor(Math.random()*allDatabase.length)].m;
                if(!options.includes(randomM)) options.push(randomM);
            }
            options.sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'choice-item';
                div.innerText = opt;
                div.onclick = () => checkChoiceAnswer(div, opt, q.m);
                choicesDiv.appendChild(div);
            });
        } else if (quizMode === 'typing') {
            const input = document.getElementById('user-input');
            input.value = '';
            input.readOnly = false;
            input.focus();
        }
    }

    function checkChoiceAnswer(el, selected, correct) {
        const allChoices = document.querySelectorAll('.choice-item');
        allChoices.forEach(c => c.onclick = null);
        if (selected === correct) {
            el.classList.add('correct');
            score++;
            speakCurrentWord(); // 맞히면 단어 읽어줌
        } else {
            el.classList.add('wrong');
            allChoices.forEach(c => { if(c.innerText === correct) c.classList.add('correct'); });
        }
        showResult();
    }

    function checkTypingAnswer() {
        const input = document.getElementById('user-input');
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = sessionWords[current].w.toLowerCase();
        if(!userAnswer) return;
        input.readOnly = true;
        if (userAnswer === correctAnswer) {
            score++;
            speakCurrentWord(); // 맞히면 단어 읽어줌
        } else {
            document.getElementById('word-answer-peek').innerText = `정답: ${sessionWords[current].w}`;
            document.getElementById('word-answer-peek').style.display = 'block';
        }
        showResult();
    }

    function showStudyResult() {
        document.getElementById('word-answer-peek').innerText = `뜻: ${sessionWords[current].m}`;
        document.getElementById('word-answer-peek').style.display = 'block';
        document.getElementById('study-ui').style.display = 'none';
        speakCurrentWord(); // 뜻 볼 때 단어 읽어줌
        showResult();
    }

    function showResult() {
        document.getElementById('example-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function next() {
        current++;
        if (current < 20) {
            if(quizMode === 'study') document.getElementById('study-ui').style.display = 'block';
            showQuestion();
        } else {
            alert(`퀘스트 완료! 점수: ${score * 5}점`);
            location.reload();
        }
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && quizMode === 'typing') {
            if(document.getElementById('next-btn').style.display === 'none') checkTypingAnswer();
            else next();
        }
    });
</script>

</body>
</html>
