<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hael's Perfect 20 Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #0F172A; color: #F8FAFC; overflow: hidden; }
        .container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; padding: 30px; flex-direction: column; flex-grow: 1; justify-content: center; }
        .active { display: flex; animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 40px 20px; text-align: center; }
        .hero-icon { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 20px #38BDF8); }
        .title { font-size: 32px; font-weight: 900; background: linear-gradient(to right, #38BDF8, #818CF8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .count-badge { background: #334155; padding: 8px 16px; border-radius: 12px; font-size: 14px; color: #94A3B8; margin-bottom: 30px; display: inline-block; border: 1px solid #475569; }

        .btn { border: none; border-radius: 20px; padding: 22px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 15px; }
        .btn-main { background: #38BDF8; color: #0F172A; box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        .btn-sub { background: #1E293B; color: #38BDF8; border: 1px solid #38BDF8; }
        .btn:active { transform: scale(0.96); }

        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: #1E293B; border-radius: 28px; padding: 50px 20px; text-align: center; margin-bottom: 30px; border: 1px solid #334155; }
        .card h2 { font-size: 42px; margin: 0; color: #F8FAFC; }

        .word-input { width: 100%; background: #1E293B; border: 2px solid #334155; border-radius: 20px; padding: 20px; font-size: 24px; color: #F8FAFC; text-align: center; margin-bottom: 20px; }
        .feedback { text-align: center; font-weight: bold; height: 24px; margin-bottom: 10px; visibility: hidden; }
        .feedback.show { visibility: visible; }
        .correct-text { color: #10B981; }
        .wrong-text { color: #EF4444; }

        .choice-list { display: grid; gap: 12px; }
        .choice-btn { background: #1E293B; border: 1px solid #334155; border-radius: 20px; padding: 20px; font-size: 17px; color: #F8FAFC; text-align: center; cursor: pointer; }
        .choice-btn.correct { background: #10B981 !important; border-color: #10B981 !important; }
        .choice-btn.wrong { background: #EF4444 !important; border-color: #EF4444 !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="screen active">
        <div class="glass-card">
            <div class="hero-icon">💎</div>
            <div class="title">WORD QUEST</div>
            <div class="count-badge">REAL WORDS: <span id="db-count">0</span></div>
            <button class="btn btn-main" onclick="startQuest('choice')">객관식 20문제</button>
            <button class="btn btn-sub" onclick="startQuest('typing')">주관식 20문제</button>
        </div>
    </div>

    <div id="quiz" class="screen">
        <div class="q-header">
            <div id="q-num" style="color: #38BDF8; font-weight: bold;">STEP 01/20</div>
            <div id="score-text" style="color: #94A3B8;">SCORE: 0</div>
        </div>
        
        <div class="card"><h2 id="display-q">...</h2></div>
        
        <div id="typing-ui" style="display: none;">
            <div id="feedback" class="feedback">정답!</div>
            <input type="text" id="user-input" class="word-input" placeholder="영어 단어 입력" autocomplete="off" spellcheck="false">
            <button class="btn btn-main" onclick="checkTyping()">확인</button>
        </div>

        <div id="choice-ui" class="choice-list" style="display: none;"></div>
    </div>
</div>

<script>
    // [중요] 오답 보기를 만들 때 사용할 실제 단어 리스트
    const choiceWords = [
        {w: "Acknowledge", m: "인정하다"}, {w: "Determine", m: "결정하다"}, {w: "Sustainable", m: "지속 가능한"}, {w: "Significant", m: "중요한"},
        {w: "Environment", m: "환경"}, {w: "Consequence", m: "결과"}, {w: "Accomplish", m: "성취하다"}, {w: "Sufficient", m: "충분한"},
        {w: "Experience", m: "경험"}, {w: "Habit", m: "습관"}, {w: "Routine", m: "일상"}, {w: "Schedule", m: "일정"},
        {w: "Health", m: "건강"}, {w: "Exercise", m: "운동"}, {w: "Appointment", m: "약속"}, {w: "Invitation", m: "초대"},
        {w: "Confident", m: "자신감 있는"}, {w: "Creative", m: "창의적인"}, {w: "Generous", m: "관대한"}, {w: "Humble", m: "겸손한"},
        {w: "Patient", m: "인내심 있는"}, {w: "Honest", m: "정직한"}, {w: "Brave", m: "용감한"}, {w: "Optimistic", m: "낙관적인"},
        {w: "Subject", m: "과목"}, {w: "Degree", m: "학위"}, {w: "Scholarship", m: "장학금"}, {w: "Innovation", m: "혁신"},
        {w: "Analyze", m: "분석하다"}, {w: "Evaluate", m: "평가하다"}, {w: "Galaxy", m: "은하"}, {w: "Evolution", m: "진화"},
        {w: "Strategy", m: "전략"}, {w: "Calculate", m: "계산하다"}, {w: "Succeed", m: "성공하다"}, {w: "Maintain", m: "유지하다"},
        {w: "Observe", m: "관찰하다"}, {w: "Imagine", m: "상상하다"}, {w: "Communicate", m: "소통하다"}, {w: "Respond", m: "응답하다"}
    ];

    let megaDatabase = [...choiceWords];
    
    // 이전에 주석 처리했던 9,000개 데이터 부분은 삭제하지 않고 두셨으므로
    // choiceWords 데이터만 megaDatabase에 넣어서 진짜 단어만 나오게 했습니다.

    document.getElementById('db-count').innerText = megaDatabase.length;

    let mode = '';
    let sessionWords = [];
    let curIdx = 0;
    let score = 0;

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkTyping();
    });

    function startQuest(m) {
        mode = m;
        // 20문제로 설정!
        sessionWords = [...megaDatabase].sort(() => Math.random() - 0.5).slice(0, 20);
        curIdx = 0; score = 0;
        
        document.getElementById('typing-ui').style.display = (mode === 'typing') ? 'block' : 'none';
        document.getElementById('choice-ui').style.display = (mode === 'choice') ? 'grid' : 'none';
        
        switchScreen('quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = sessionWords[curIdx];
        document.getElementById('q-num').innerText = `STEP ${String(curIdx + 1).padStart(2, '0')}/20`;
        document.getElementById('score-text').innerText = `SCORE: ${score * 5}`;

        if (mode === 'typing') {
            document.getElementById('display-q').innerText = q.m;
            const input = document.getElementById('user-input');
            input.value = '';
            input.focus();
            document.getElementById('feedback').classList.remove('show');
        } else {
            document.getElementById('display-q').innerText = q.w;
            const area = document.getElementById('choice-ui');
            area.innerHTML = '';
            
            // [수정 완료] 이제 megaDatabase가 아닌 choiceWords에서만 오답을 가져옵니다!
            let choices = [q.m];
            while(choices.length < 4) {
                let rand = choiceWords[Math.floor(Math.random() * choiceWords.length)].m;
                if(!choices.includes(rand)) choices.push(rand);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'choice-btn';
                btn.innerText = c;
                btn.onclick = () => checkChoice(btn, c, q.m);
                area.appendChild(btn);
            });
        }
    }

    function checkTyping() {
        const input = document.getElementById('user-input');
        const feedback = document.getElementById('feedback');
        const userVal = input.value.trim().toLowerCase();
        const correctVal = sessionWords[curIdx].w.toLowerCase();

        if (!userVal) return;

        feedback.classList.add('show');
        if (userVal === correctVal) {
            feedback.innerText = "정답! ✨";
            feedback.className = "feedback show correct-text";
            score++;
            setTimeout(next, 800);
        } else {
            feedback.innerText = `틀렸어요! 정답: ${sessionWords[curIdx].w}`;
            feedback.className = "feedback show wrong-text";
            setTimeout(next, 2000);
        }
    }

    function checkChoice(btn, sel, cor) {
        const all = document.querySelectorAll('.choice-btn');
        all.forEach(b => b.style.pointerEvents = 'none');

        if(sel === cor) {
            btn.classList.add('correct');
            score++;
            setTimeout(next, 400);
        } else {
            btn.classList.add('wrong');
            all.forEach(b => { if(b.innerText === cor) b.classList.add('correct'); });
            setTimeout(next, 1200);
        }
    }

    function next() {
        curIdx++;
        if (curIdx < 20) renderQuestion();
        else {
            alert(`퀘스트 완료! 점수: ${score * 5}점`);
            switchScreen('home');
        }
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
