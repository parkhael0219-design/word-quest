<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>하엘의 영단어 공부노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 기본 설정: iOS 세이프 영역 대응 */
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            margin: 0; font-family: 'Noto Sans KR', sans-serif; 
            background-color: #0f172a; color: #f8fafc; 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow-y: auto;
            /* 아이폰 상단 노치 여백 확보 */
            padding-top: var(--sat);
        }
        
        .container { 
            width: 100%; max-width: 400px; 
            padding: 20px; 
            padding-bottom: calc(40px + var(--sab)); /* 아이폰 하단 홈바 여백 확보 */
        }

        .screen { display: none; flex-direction: column; width: 100%; }
        .active { display: flex; }

        /* 진행 정보 레이아웃 (아이폰 스타일) */
        .status-bar {
            display: flex; justify-content: space-between;
            margin-bottom: 12px; font-size: 13px; font-weight: 900;
            color: #38bdf8; letter-spacing: 0.5px;
        }

        /* 영상 속 느낌의 얇은 프로그레스 바 */
        .progress-bg { background: rgba(255,255,255,0.1); border-radius: 10px; height: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { background: #6366f1; height: 100%; width: 0%; transition: 0.4s ease; }

        /* 퀴즈 카드 */
        .quiz-card { 
            background: #1e293b; border-radius: 25px; padding: 40px 20px; 
            text-align: center; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .quiz-word { font-size: 44px; font-weight: 900; color: white; margin-bottom: 10px; }
        
        .btn-speak { 
            background: rgba(255,255,255,0.1); border: none; border-radius: 50%; 
            width: 48px; height: 48px; font-size: 20px; color: white; 
            cursor: pointer; margin-bottom: 15px;
        }

        /* 선택지 디자인 */
        .choice-list { display: grid; gap: 12px; }
        .choice-item { 
            background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); 
            border-radius: 18px; padding: 18px; font-size: 16px; 
            text-align: center; color: #cbd5e1; cursor: pointer; transition: 0.2s;
        }
        .correct { background: #10b981 !important; color: white; border-color: #10b981 !important; font-weight: 900; }
        .wrong { background: #ef4444 !important; color: white; border-color: #ef4444 !important; }
        
        /* 예문 박스 */
        .example-box { 
            display: none; background: rgba(0,0,0,0.25); padding: 18px; 
            text-align: left; margin-top: 20px; border-radius: 15px; 
            font-size: 14px; line-height: 1.6; border-left: 4px solid #6366f1;
        }

        /* 다음 버튼 */
        .btn-next { 
            display: none; background: #f8fafc; color: #0f172a; border: none; 
            border-radius: 15px; padding: 18px; font-size: 16px; 
            font-weight: 900; margin-top: 25px; width: 100%; cursor: pointer;
        }

        /* 메인 시작 버튼 */
        .btn-main { 
            background: #4f46e5; color: white; border: none; 
            border-radius: 20px; padding: 20px; font-size: 18px; 
            font-weight: 900; width: 100%; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="main-screen" class="screen active">
        <div style="text-align:center; padding: 50px 0;">
            <div style="font-size: 60px; margin-bottom: 20px;">📘</div>
            <h1 style="font-size: 26px; font-weight: 900; color: white;">하엘의 단어 퀘스트</h1>
            <p style="color: #94a3b8;">iOS & Android 완벽 호환</p>
        </div>
        <button class="btn-main" onclick="unlockAudio(); startQuiz()">도전 시작</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="status-bar"><span id="progress-info">STEP 01/20</span><span id="score-info">SCORE: 0</span></div>
        <div class="progress-bg"><div id="progress-bar" class="progress-bar"></div></div>
        
        <div class="quiz-card">
            <button class="btn-speak" onclick="speakCurrentWord()">🔊</button>
            <div id="question-word" class="quiz-word">Word</div>
            <div id="example-box" class="example-box">
                <div style="color:white; font-weight:bold; margin-bottom:4px;">Example</div>
                <div id="ex-en-text" style="color:#cbd5e1; font-style:italic;">Sentence</div>
                <div id="ex-ko" style="color:#94a3b8; font-size:13px;">해석</div>
            </div>
        </div>
        
        <div id="choices" class="choice-list"></div>
        <button id="next-btn" class="btn-next" onclick="next()">다음으로 👉</button>
    </div>
</div>

<script>
    // iOS에서는 소리 재생을 위해 첫 터치가 필요함
    function unlockAudio() {
        const msg = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(msg);
    }

    // 350개 단어 중 일부 예시 (여기에 단어 다 넣으시면 됩니다!)
    const allDatabase = [
        {w:"Reliable", m:"믿을 수 있는", ex:"He is a reliable friend.", exk:"그는 믿을 수 있는 친구다."},
        {w:"Gravity", m:"중력", ex:"Gravity pulls things down.", exk:"중력은 물체를 아래로 끌어당긴다."},
        {w:"Invite", m:"초대하다", ex:"Invite them to the party.", exk:"그들을 파티에 초대해라."},
        {w:"Success", m:"성공", ex:"Hard work leads to success.", exk:"노력은 성공으로 이어진다."},
        {w:"Believe", m:"믿다", ex:"Believe in yourself.", exk:"자신을 믿으세요."}
        // ... (하엘님의 350개 단어를 여기에 쭉 넣으세요)
    ];

    let sessionWords = [];
    let current = 0;
    let score = 0;

    function playTTS(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function speakCurrentWord() { playTTS(sessionWords[current].w); }

    function startQuiz() {
        current = 0; score = 0;
        sessionWords = [...allDatabase].sort(() => Math.random() - 0.5).slice(0, 20);
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = sessionWords[current];
        document.getElementById('question-word').innerText = q.w;
        document.getElementById('ex-en-text').innerText = q.ex;
        document.getElementById('ex-ko').innerText = q.exk;
        document.getElementById('example-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress-info').innerText = `STEP ${String(current + 1).padStart(2, '0')}/20`;
        document.getElementById('score-info').innerText = `SCORE: ${score * 5}`;
        document.getElementById('progress-bar').style.width = `${((current + 1) / 20) * 100}%`;

        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        let options = [q.m];
        while(options.length < 4) {
            let randomM = allDatabase[Math.floor(Math.random()*allDatabase.length)].m;
            if(!options.includes(randomM)) options.push(randomM);
        }
        options.sort(() => Math.random() - 0.5);
        options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'choice-item';
            div.innerText = opt;
            div.onclick = () => checkAnswer(div, opt, q.m);
            choicesDiv.appendChild(div);
        });
    }

    function checkAnswer(el, selected, correct) {
        const allChoices = document.querySelectorAll('.choice-item');
        allChoices.forEach(c => c.onclick = null);
        if (selected === correct) {
            el.classList.add('correct');
            score++;
            speakCurrentWord();
        } else {
            el.classList.add('wrong');
            allChoices.forEach(c => { if(c.innerText === correct) c.classList.add('correct'); });
        }
        document.getElementById('example-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        
        // 버튼 생기면 부드럽게 스크롤 (아이폰/안드로이드 공통)
        setTimeout(() => { window.scrollBy({ top: 150, behavior: 'smooth' }); }, 100);
    }

    function next() {
        current++;
        if (current < 20) showQuestion();
        else {
            alert(`🎉 완료! 총 ${score * 5}점을 얻었습니다!`);
            location.reload();
        }
    }
</script>
</body>
</html>
