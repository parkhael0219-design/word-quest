<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>하엘의 영단어 공부노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f8fbff; color: #333; overflow-y: auto; min-height: 100vh; padding-top: var(--sat); }
        .container { max-width: 500px; margin: 0 auto; position: relative; }
        .screen { display: none; padding: 25px; flex-direction: column; }
        .active { display: flex; }
        .main-header { text-align: center; padding: 70px 20px 40px; background: #ffffff; border-radius: 0 0 50px 50px; box-shadow: 0 15px 30px rgba(72, 52, 212, 0.05); margin-bottom: 30px; }
        .main-header h1 { font-size: 26px; font-weight: 900; color: #4834d4; margin: 0; }
        .menu-list { display: grid; gap: 15px; }
        .menu-item { background: #ffffff; padding: 22px; border-radius: 25px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 10px 20px rgba(72, 52, 212, 0.03); border: 1px solid rgba(72, 52, 212, 0.05); }
        .menu-item b { font-size: 18px; margin-left: 15px; }
        .quiz-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 900; color: #4834d4; }
        .btn-home { background: none; border: none; font-size: 22px; cursor: pointer; }
        .progress-bg { background: #eee; border-radius: 10px; height: 8px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { background: #4834d4; height: 100%; width: 0%; transition: 0.3s; }
        .quiz-card { background: #ffffff; padding: 45px 20px; border-radius: 35px; text-align: center; box-shadow: 0 15px 35px rgba(72, 52, 212, 0.08); margin-bottom: 25px; }
        .word-text { font-size: 42px; font-weight: 900; color: #2f3542; margin-bottom: 10px; }
        .word-answer-peek { display: none; color: #ff7675; font-weight: 900; font-size: 20px; margin-top: 10px; }
        .example-box { display: none; background: #f1f2ff; padding: 20px; border-radius: 20px; text-align: left; margin-top: 20px; border-left: 5px solid #4834d4; }
        .choice-list { display: grid; gap: 12px; }
        .choice-item { background: #f8fbff; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #f1f2ff; font-weight: 500; cursor: pointer; }
        .correct { background: #ebfffa !important; color: #00b894 !important; border-color: #00b894 !important; font-weight: 900; }
        .wrong { background: #fff5f5 !important; color: #ff7675 !important; border-color: #ff7675 !important; }
        .btn-next { display: none; background: #4834d4; color: white; border: none; border-radius: 20px; padding: 20px; font-size: 18px; font-weight: 900; width: 100%; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="main-screen" class="screen active">
        <div class="main-header"><h1>하엘의 공부노트</h1><p>딱 20단어만 집중해서 해보자!</p></div>
        <div class="menu-list">
            <div class="menu-item" onclick="unlockAudio(); startQuiz('choice')">🎯 <b>객관식 퀴즈</b></div>
            <div class="menu-item" onclick="unlockAudio(); startQuiz('typing')">⌨️ <b>주관식 타이핑</b></div>
            <div class="menu-item" onclick="unlockAudio(); startQuiz('study')">📖 <b>단어 학습하기</b></div>
        </div>
    </div>
    <div id="quiz-screen" class="screen">
        <div class="quiz-top"><button class="btn-home" onclick="goHome()">🏠</button><span id="score-text">SCORE: 0</span></div>
        <div class="progress-bg"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="quiz-card">
            <div id="word-display" class="word-text">Word</div>
            <div id="word-answer-peek" class="word-answer-peek">정답 표시</div>
            <div id="example-box" class="example-box">
                <div style="font-weight:900; color:#4834d4; margin-bottom:5px;">Example</div>
                <div id="ex-en" style="font-style:italic; color:#2f3542;">Sentence</div>
                <div id="ex-ko" style="color:#636e72; font-size:14px; margin-top:5px;">해석</div>
            </div>
        </div>
        <div id="typing-ui" style="display:none;"><input type="text" id="user-input" style="width:100%; padding:20px; border-radius:20px; border:2px solid #f1f2ff; text-align:center; font-size:18px;" placeholder="영단어 입력 후 엔터"></div>
        <div id="choice-ui" class="choice-list"></div>
        <div id="study-ui" style="display:none;"><button class="btn-next" style="display:block; background:#686de0;" onclick="showStudyResult()">뜻 확인하기</button></div>
        <button id="next-btn" class="btn-next" onclick="next()">다음으로 👉</button>
    </div>
</div>
<script>
    const allDatabase = [
        {w:"Reliable", m:"믿을 수 있는", ex:"He is a reliable friend.", exk:"그는 믿을 수 있는 친구다."},
        {w:"Gravity", m:"중력", ex:"Gravity pulls things down.", exk:"중력은 물체를 아래로 끌어당긴다."},
        {w:"Invite", m:"초대하다", ex:"Invite them to the party.", exk:"그들을 파티에 초대해라."},
        {w:"Success", m:"성공", ex:"Hard work leads to success.", exk:"노력은 성공으로 이어진다."},
        {w:"Believe", m:"믿다", ex:"Believe in yourself.", exk:"자신을 믿으세요."},
        {w:"Adventure", m:"모험", ex:"I love a great adventure.", exk:"나는 멋진 모험을 좋아한다."},
        {w:"Balance", m:"균형", ex:"Keep your balance on the ice.", exk:"얼음 위에서 균형을 잡으세요."},
        {w:"Challenge", m:"도전", ex:"Face the challenge bravely.", exk:"도전에 용감하게 맞서세요."},
        {w:"Discover", m:"발견하다", ex:"They discovered a new star.", exk:"그들은 새로운 별을 발견했다."},
        {w:"Energy", m:"에너지", ex:"Kids have so much energy.", exk:"아이들은 에너지가 넘친다."},
        {w:"Flexible", m:"유연한", ex:"You need to be flexible.", exk:"당신은 유연해질 필요가 있다."},
        {w:"Goal", m:"목표", ex:"What is your main goal?", exk:"당신의 주요 목표는 무엇인가요?"},
        {w:"Honor", m:"명예", ex:"It is a great honor.", exk:"그것은 큰 명예입니다."},
        {w:"Improve", m:"개선하다", ex:"Practice to improve your skills.", exk:"기술을 개선하기 위해 연습하세요."},
        {w:"Journey", m:"여정", ex:"Life is a long journey.", exk:"인생은 긴 여정이다."},
        {w:"Knowledge", m:"지식", ex:"Knowledge is power.", exk:"아는 것이 힘이다."},
        {w:"Limit", m:"한계", ex:"Know your own limit.", exk:"자신의 한계를 아세요."},
        {w:"Message", m:"메시지", ex:"Send a message to her.", exk:"그녀에게 메시지를 보내세요."},
        {w:"Nature", m:"자연", ex:"Protect our mother nature.", exk:"우리의 대자연을 보호합시다."},
        {w:"Opinion", m:"의견", ex:"In my opinion, it's good.", exk:"내 의견으로는, 그것은 좋다."}
    ];

    let sessionWords = []; let current = 0; let score = 0; let quizMode = '';

    function goHome() { if(confirm("메인으로 나갈까요?")) location.reload(); }
    function unlockAudio() { const msg = new SpeechSynthesisUtterance(''); window.speechSynthesis.speak(msg); }
    function playTTS(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
    function speakCurrentWord() { playTTS(sessionWords[current].w); }

    function startQuiz(mode) {
        quizMode = mode; current = 0; score = 0;
        sessionWords = [...allDatabase].sort(() => Math.random() - 0.5);
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = sessionWords[current];
        document.getElementById('word-answer-peek').style.display = 'none';
        document.getElementById('example-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('score-text').innerText = `SCORE: ${score * 5}`;
        document.getElementById('progress-bar').style.width = `${((current + 1) / 20) * 100}%`;
        document.getElementById('choice-ui').innerHTML = '';
        document.getElementById('typing-ui').style.display = 'none';
        document.getElementById('study-ui').style.display = 'none';

        if (quizMode === 'choice') {
            document.getElementById('word-display').innerText = q.w;
            let opts = [q.m];
            while(opts.length < 4) {
                let r = allDatabase[Math.floor(Math.random()*allDatabase.length)].m;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5).forEach(opt => {
                const div = document.createElement('div');
                div.className = 'choice-item'; div.innerText = opt;
                div.onclick = () => {
                    const all = document.querySelectorAll('.choice-item');
                    all.forEach(c => c.onclick = null);
                    if(opt === q.m) { div.classList.add('correct'); score++; speakCurrentWord(); }
                    else { div.classList.add('wrong'); all.forEach(c => { if(c.innerText === q.m) c.classList.add('correct'); }); }
                    showResult();
                };
                document.getElementById('choice-ui').appendChild(div);
            });
        } else if (quizMode === 'typing') {
            document.getElementById('word-display').innerText = q.m;
            document.getElementById('typing-ui').style.display = 'block';
            const input = document.getElementById('user-input');
            input.value = ''; input.readOnly = false;
            input.onkeypress = (e) => {
                if(e.key === 'Enter') {
                    input.readOnly = true;
                    if(input.value.trim().toLowerCase() === q.w.toLowerCase()) { score++; speakCurrentWord(); }
                    else { document.getElementById('word-answer-peek').innerText = `정답: ${q.w}`; document.getElementById('word-answer-peek').style.display = 'block'; }
                    showResult();
                }
            };
        } else if (quizMode === 'study') {
            document.getElementById('word-display').innerText = q.w;
            document.getElementById('study-ui').style.display = 'block';
            speakCurrentWord();
        }
    }

    function showStudyResult() {
        document.getElementById('word-answer-peek').innerText = `뜻: ${sessionWords[current].m}`;
        document.getElementById('word-answer-peek').style.display = 'block';
        document.getElementById('study-ui').style.display = 'none';
        showResult();
    }

    function showResult() {
        const q = sessionWords[current];
        document.getElementById('ex-en').innerText = q.ex;
        document.getElementById('ex-ko').innerText = q.exk;
        document.getElementById('example-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        setTimeout(() => { window.scrollBy({ top: 200, behavior: 'smooth' }); }, 100);
    }

    function next() {
        current++;
        if (current < 20) showQuestion();
        else { alert("🎉 20개 완료!"); location.reload(); }
    }
</script>
</body>
</html>
